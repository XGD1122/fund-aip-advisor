<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日买入推荐 - 指数基金 Top 20</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>今日值得买入的指数基金 Top 20</h1>
            <div class="header-right">
                <span id="freshness">加载中...</span>
                <button id="refresh-btn" class="btn">刷新数据</button>
            </div>
        </header>
        <main>
            <div id="loading">正在计算买入时机...</div>
            <div id="error" style="display:none"></div>
            <table id="table" style="display:none">
                <thead>
                    <tr>
                        <th>#</th><th>代码</th><th>名称</th><th>评分</th>
                        <th>近5日</th><th>近20日</th><th>近1年</th>
                        <th>估值分位</th><th>回撤</th><th>均线</th>
                        <th>RSI</th><th>连跌</th><th>提示</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </main>
    </div>

    <!-- 详情弹窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chart-row">
                    <div class="chart-container">
                        <canvas id="chart-nav"></canvas>
                    </div>
                </div>
                <div class="chart-row">
                    <div class="chart-container chart-half">
                        <canvas id="chart-rsi"></canvas>
                    </div>
                    <div class="chart-container chart-half">
                        <canvas id="chart-macd"></canvas>
                    </div>
                </div>
                <div id="detail-stats" class="detail-stats"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
