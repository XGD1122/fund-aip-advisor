<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日买入推荐 - 指数基金 Top 20</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>今日值得买入的指数基金 Top 20</h1>
            <div class="header-right">
                <span id="freshness">加载中...</span>
                <button id="refresh-btn" class="btn">刷新数据</button>
            </div>
        </header>
        <main>
            <div id="loading">正在计算买入时机...</div>
            <div id="error" style="display:none"></div>
            <table id="table" style="display:none">
                <thead>
                    <tr>
                        <th>#</th><th>代码</th><th>名称</th><th>评分</th>
                        <th>近5日</th><th>近20日</th><th>近1年</th>
                        <th>估值分位</th><th>回撤</th><th>均线</th>
                        <th>RSI</th><th>连跌</th><th>提示</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </main>

        <!-- 我的持仓 -->
        <section class="portfolio-section">
            <div class="portfolio-header">
                <h2>我的持仓</h2>
                <button id="add-holding-btn" class="btn btn-sm">＋ 添加持仓</button>
            </div>

            <!-- 持仓汇总卡片 -->
            <div id="portfolio-summary" class="portfolio-summary"></div>

            <!-- 添加持仓表单 -->
            <div id="add-holding-form" class="add-holding-form" style="display:none">
                <h3>添加持仓</h3>
                <div class="form-row">
                    <input type="text" id="hf-code" placeholder="基金代码" maxlength="6">
                    <span id="hf-name" class="form-hint"></span>
                </div>
                <div class="form-row">
                    <input type="date" id="hf-date">
                    <input type="number" id="hf-nav" placeholder="买入净值" step="0.0001">
                    <input type="number" id="hf-amount" placeholder="买入金额(元)" step="0.01">
                </div>
                <div class="form-row">
                    <input type="text" id="hf-notes" placeholder="备注(可选)">
                </div>
                <div class="form-actions">
                    <button id="hf-save" class="btn">保存</button>
                    <button id="hf-cancel" class="btn btn-ghost">取消</button>
                </div>
            </div>

            <!-- 持仓列表 -->
            <div id="portfolio-list" class="portfolio-list"></div>
        </section>
    </div>

    <!-- 详情弹窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <div class="range-btns">
                    <button class="rng-btn active" data-range="all">全部</button>
                    <button class="rng-btn" data-range="3y">3年</button>
                    <button class="rng-btn" data-range="1y">1年</button>
                    <button class="rng-btn" data-range="6m">6月</button>
                    <button class="rng-btn" data-range="3m">3月</button>
                    <button class="rng-btn" data-range="1m">1月</button>
                </div>
                <button id="modal-close" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="chart-row">
                    <div class="chart-container">
                        <canvas id="chart-nav"></canvas>
                    </div>
                </div>
                <div class="chart-row">
                    <div class="chart-container chart-half">
                        <canvas id="chart-rsi"></canvas>
                    </div>
                    <div class="chart-container chart-half">
                        <canvas id="chart-macd"></canvas>
                    </div>
                </div>
                <div id="detail-stats" class="detail-stats"></div>
                <div id="detail-advice" class="detail-advice"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
